version: "3.8"

services:
  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/taskmanager
    depends_on:
      - mongo
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      HOST: 0.0.0.0
      REACT_APP_API_URL: http://localhost:5000
    depends_on:
      - backend
    stdin_open: true
    tty: true

volumes:
  mongo_data:
